<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#1a0d2e"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff4499"/>
      <stop offset="100%" stop-color="#8800ff"/>
    </linearGradient>
    <linearGradient id="g2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ddff"/>
      <stop offset="100%" stop-color="#0044ff"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ff4400"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ff99"/>
      <stop offset="100%" stop-color="#00aacc"/>
    </linearGradient>
    <linearGradient id="g5" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#ffff00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#abg)"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.06">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="700" x2="1200" y2="700"/>
    <line x1="100"  y1="0" x2="100"  y2="800"/>
    <line x1="200"  y1="0" x2="200"  y2="800"/>
    <line x1="300"  y1="0" x2="300"  y2="800"/>
    <line x1="400"  y1="0" x2="400"  y2="800"/>
    <line x1="500"  y1="0" x2="500"  y2="800"/>
    <line x1="600"  y1="0" x2="600"  y2="800"/>
    <line x1="700"  y1="0" x2="700"  y2="800"/>
    <line x1="800"  y1="0" x2="800"  y2="800"/>
    <line x1="900"  y1="0" x2="900"  y2="800"/>
    <line x1="1000" y1="0" x2="1000" y2="800"/>
    <line x1="1100" y1="0" x2="1100" y2="800"/>
  </g>

  <!-- Large background shapes (low opacity) -->
  <circle cx="600" cy="400" r="360" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
  <circle cx="600" cy="400" r="260" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
  <circle cx="600" cy="400" r="160" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>

  <!-- Hexagons -->
  <polygon points="600,80 686,130 686,230 600,280 514,230 514,130" fill="url(#g1)" opacity="0.75"/>
  <polygon points="600,520 686,570 686,670 600,720 514,670 514,570" fill="url(#g2)" opacity="0.7"/>
  <polygon points="160,290 230,330 230,410 160,450 90,410 90,330"  fill="url(#g3)" opacity="0.72"/>
  <polygon points="1040,290 1110,330 1110,410 1040,450 970,410 970,330" fill="url(#g4)" opacity="0.72"/>
  <polygon points="380,180 440,215 440,285 380,320 320,285 320,215" fill="url(#g5)" opacity="0.68"/>
  <polygon points="820,480 880,515 880,585 820,620 760,585 760,515"  fill="url(#g1)" opacity="0.65"/>

  <!-- Triangles -->
  <polygon points="200,50 320,250 80,250"   fill="url(#g4)" opacity="0.55"/>
  <polygon points="1000,50 1120,250 880,250" fill="url(#g3)" opacity="0.55"/>
  <polygon points="200,750 320,550 80,550"  fill="url(#g2)" opacity="0.5"/>
  <polygon points="1000,750 1120,550 880,550" fill="url(#g5)" opacity="0.5"/>

  <!-- Center diamond -->
  <polygon points="600,300 720,400 600,500 480,400" fill="url(#g2)" opacity="0.6"/>
  <polygon points="600,340 680,400 600,460 520,400" fill="url(#g1)" opacity="0.7"/>

  <!-- Circles -->
  <circle cx="600" cy="400" r="60"  fill="url(#g5)" opacity="0.8"/>
  <circle cx="600" cy="400" r="30"  fill="#ffffff" opacity="0.9"/>
  <circle cx="200" cy="400" r="55"  fill="url(#g1)" opacity="0.6"/>
  <circle cx="1000" cy="400" r="55" fill="url(#g2)" opacity="0.6"/>

  <!-- Thin accent rings -->
  <circle cx="600" cy="180" r="50" fill="none" stroke="#ff4499" stroke-width="2" opacity="0.6"/>
  <circle cx="600" cy="620" r="50" fill="none" stroke="#00ddff" stroke-width="2" opacity="0.6"/>

  <!-- Corner accent triangles -->
  <polygon points="0,0 120,0 0,120"     fill="url(#g3)" opacity="0.4"/>
  <polygon points="1200,0 1080,0 1200,120" fill="url(#g4)" opacity="0.4"/>
  <polygon points="0,800 120,800 0,680"    fill="url(#g2)" opacity="0.4"/>
  <polygon points="1200,800 1080,800 1200,680" fill="url(#g1)" opacity="0.4"/>

  <!-- Label -->
  <rect x="0" y="745" width="1200" height="55" fill="rgba(0,0,0,0.5)"/>
  <text x="24" y="780" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#ff88cc">Abstract Geometry</text>
  <text x="24" y="798" font-family="system-ui,sans-serif" font-size="14" fill="#aa66ff">Abstract &bull; Served via CloudFront + S3</text>
</svg>
