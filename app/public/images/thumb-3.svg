<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="t3bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0800"/>
      <stop offset="100%" stop-color="#3a1800"/>
    </linearGradient>
    <radialGradient id="t3glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#d29922" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#d29922" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="640" height="360" fill="url(#t3bg)"/>
  <ellipse cx="320" cy="180" rx="200" ry="200" fill="url(#t3glow)"/>

  <!-- Motion blur lines (speed effect) -->
  <g stroke="#ff8800" stroke-width="1" opacity="0.12">
    <line x1="0" y1="80" x2="640" y2="110"/>
    <line x1="0" y1="130" x2="640" y2="155"/>
    <line x1="0" y1="180" x2="640" y2="200"/>
    <line x1="0" y1="230" x2="640" y2="245"/>
    <line x1="0" y1="280" x2="640" y2="290"/>
  </g>
  <g stroke="#ffaa00" stroke-width="2" opacity="0.08">
    <line x1="0" y1="100" x2="640" y2="135"/>
    <line x1="0" y1="200" x2="640" y2="225"/>
    <line x1="0" y1="300" x2="640" y2="315"/>
  </g>

  <!-- Film strip -->
