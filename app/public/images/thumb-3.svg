    <rect x="292" y="338" width="28" height="16" rx="2"/>
    <rect x="332" y="338" width="28" height="16" rx="2"/>
    <rect x="372" y="338" width="28" height="16" rx="2"/>
    <rect x="412" y="338" width="28" height="16" rx="2"/>
