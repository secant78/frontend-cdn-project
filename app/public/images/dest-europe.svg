<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c1654;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6c5ce7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a29bfe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fjord" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2980b9;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#1a3a6b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cliff" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a3728;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d1b0e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" />
  <!-- Aurora / northern lights -->
  <ellipse cx="400" cy="80" rx="350" ry="90" fill="#00cec9" opacity="0.15"/>
  <ellipse cx="300" cy="60" rx="280" ry="70" fill="#55efc4" opacity="0.12"/>
  <ellipse cx="500" cy="70" rx="260" ry="65" fill="#a29bfe" opacity="0.15"/>
  <!-- Stars -->
  <circle cx="80" cy="50" r="2" fill="white" opacity="0.8"/>
  <circle cx="200" cy="30" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="350" cy="20" r="2" fill="white" opacity="0.85"/>
  <circle cx="550" cy="35" r="1.5" fill="white" opacity="0.75"/>
  <circle cx="720" cy="45" r="2" fill="white" opacity="0.8"/>
  <circle cx="650" cy="20" r="1.5" fill="white" opacity="0.7"/>
  <!-- Fjord cliffs -->
  <polygon points="0,400 0,200 120,300 180,220 250,320 0,400" fill="url(#cliff)" />
  <polygon points="800,400 800,180 680,290 610,210 540,320 800,400" fill="url(#cliff)" opacity="0.9"/>
  <!-- Cliff greenery -->
  <polygon points="0,200 120,300 70,280" fill="#27ae60" opacity="0.5"/>
  <polygon points="180,220 250,320 200,300" fill="#2ecc71" opacity="0.4"/>
  <!-- Fjord water -->
  <path d="M0 380 Q200 350 400 372 Q600 394 800 368 L800 500 L0 500 Z" fill="url(#fjord)" />
  <path d="M0 425 Q200 405 400 422 Q600 440 800 420 L800 500 L0 500 Z" fill="#1a3a6b" opacity="0.7" />
  <!-- Small boat -->
  <rect x="350" y="370" width="90" height="22" rx="8" fill="#e8e0d0"/>
  <polygon points="375,370 395,320 415,370" fill="#c0392b" opacity="0.8"/>
  <!-- Text -->
  <text x="400" y="195" font-family="Georgia, serif" font-size="68" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95" letter-spacing="2">N. Europe</text>
  <text x="400" y="252" font-family="Georgia, serif" font-size="26" fill="white" text-anchor="middle" opacity="0.85">Fjords, History &amp; Midnight Sun</text>
</svg>
