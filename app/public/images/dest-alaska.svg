<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a4a3a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1abc9c;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0d7a5f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glacier" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#48cae4;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#023e8a;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#0077b6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" />
  <!-- Mountains with snow -->
  <polygon points="100,350 250,150 400,350" fill="#2d6a4f" />
  <polygon points="250,150 290,220 210,220" fill="url(#glacier)" opacity="0.9"/>
  <polygon points="300,350 450,180 600,350" fill="#1a4a3a" />
  <polygon points="450,180 495,265 405,265" fill="url(#glacier)" opacity="0.9"/>
  <polygon points="500,350 620,210 750,350" fill="#0d5c45" />
  <polygon points="620,210 655,280 585,280" fill="url(#glacier)" opacity="0.85"/>
  <!-- Pine trees -->
  <polygon points="80,350 95,300 110,350" fill="#1b4332"/>
  <polygon points="140,350 155,295 170,350" fill="#2d6a4f"/>
  <polygon points="660,350 675,305 690,350" fill="#1b4332"/>
  <polygon points="710,350 725,300 740,350" fill="#2d6a4f"/>
  <!-- Water -->
  <path d="M0 370 Q100 345 200 368 Q300 390 400 362 Q500 335 600 365 Q700 395 800 362 L800 500 L0 500 Z" fill="url(#water)" />
  <path d="M0 415 Q150 395 300 412 Q450 430 600 410 Q700 398 800 415 L800 500 L0 500 Z" fill="#023e8a" opacity="0.6" />
  <!-- Text -->
  <text x="400" y="200" font-family="Georgia, serif" font-size="80" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95" letter-spacing="3">Alaska</text>
  <text x="400" y="255" font-family="Georgia, serif" font-size="26" fill="white" text-anchor="middle" opacity="0.85">Glaciers &amp; Wild Frontiers</text>
</svg>
