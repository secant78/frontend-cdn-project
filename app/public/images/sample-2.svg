<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="40%" stop-color="#3d1f5e"/>
      <stop offset="75%" stop-color="#e05c1a"/>
      <stop offset="100%" stop-color="#f0902a"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e05c1a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1a0a2e" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="bldg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1a4e"/>
      <stop offset="100%" stop-color="#0d0820"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="800" fill="url(#sky2)"/>

  <!-- Moon -->
  <circle cx="950" cy="100" r="48" fill="#ffe0a0" opacity="0.9"/>
  <circle cx="970" cy="88" r="42" fill="#3d1f5e"/>

  <!-- City buildings - back layer -->
  <g fill="#1a0e30" opacity="0.7">
    <rect x="0"   y="380" width="60"  height="280"/>
    <rect x="55"  y="340" width="45"  height="320"/>
    <rect x="95"  y="300" width="55"  height="360"/>
    <rect x="145" y="360" width="40"  height="300"/>
    <rect x="180" y="280" width="70"  height="380"/>
    <rect x="245" y="340" width="50"  height="320"/>
    <rect x="290" y="260" width="80"  height="400"/>
    <rect x="365" y="320" width="55"  height="340"/>
    <rect x="415" y="380" width="45"  height="280"/>
    <rect x="700" y="300" width="60"  height="360"/>
    <rect x="755" y="260" width="75"  height="400"/>
    <rect x="825" y="320" width="50"  height="340"/>
    <rect x="870" y="280" width="65"  height="380"/>
    <rect x="930" y="350" width="55"  height="310"/>
    <rect x="980" y="290" width="70"  height="370"/>
    <rect x="1045" y="330" width="60" height="330"/>
    <rect x="1100" y="270" width="55" height="390"/>
    <rect x="1150" y="340" width="50" height="320"/>
  </g>

  <!-- Main skyline - foreground -->
  <!-- Tower 1 - tall center -->
  <rect x="540" y="120" width="60" height="520" fill="url(#bldg1)"/>
  <rect x="548" y="108" width="44" height="20"  fill="#3a2060"/>
  <rect x="563" y="88"  width="14" height="24"  fill="#4a2a70"/>
  <!-- Antenna -->
  <rect x="569" y="40"  width="2"  height="50"  fill="#8060c0"/>

  <!-- Tower 2 -->
  <rect x="460" y="200" width="80" height="440" fill="#1e1040"/>
  <rect x="465" y="190" width="70" height="15"  fill="#2e1860"/>

  <!-- Tower 3 -->
  <rect x="620" y="240" width="70" height="400" fill="#1c0e3c"/>
  <rect x="625" y="228" width="60" height="16"  fill="#2c1858"/>

  <!-- Mid-height buildings -->
  <rect x="380" y="300" width="85" height="340" fill="#180c34"/>
  <rect x="690" y="320" width="90" height="320" fill="#180c34"/>
  <rect x="780" y="360" width="75" height="280" fill="#160a30"/>
  <rect x="300" y="350" width="85" height="310" fill="#16103a"/>
  <rect x="840" y="380" width="90" height="280" fill="#14082e"/>

  <!-- Window lights - random yellow dots -->
  <g fill="#ffd060" opacity="0.8">
    <rect x="465" y="210" width="4" height="6"/><rect x="475" y="210" width="4" height="6"/>
    <rect x="485" y="210" width="4" height="6"/><rect x="495" y="210" width="4" height="6"/>
    <rect x="465" y="225" width="4" height="6"/><rect x="485" y="225" width="4" height="6"/>
    <rect x="465" y="240" width="4" height="6"/><rect x="475" y="240" width="4" height="6"/>
    <rect x="495" y="240" width="4" height="6"/>
    <rect x="548" y="130" width="4" height="5"/><rect x="558" y="130" width="4" height="5"/>
    <rect x="568" y="130" width="4" height="5"/><rect x="578" y="130" width="4" height="5"/>
    <rect x="548" y="143" width="4" height="5"/><rect x="568" y="143" width="4" height="5"/>
    <rect x="578" y="143" width="4" height="5"/>
    <rect x="548" y="156" width="4" height="5"/><rect x="558" y="156" width="4" height="5"/>
    <rect x="625" y="248" width="4" height="5"/><rect x="635" y="248" width="4" height="5"/>
    <rect x="645" y="248" width="4" height="5"/>
    <rect x="625" y="261" width="4" height="5"/><rect x="655" y="261" width="4" height="5"/>
    <rect x="385" y="310" width="4" height="5"/><rect x="395" y="310" width="4" height="5"/>
    <rect x="415" y="310" width="4" height="5"/><rect x="385" y="323" width="4" height="5"/>
    <rect x="405" y="323" width="4" height="5"/><rect x="415" y="323" width="4" height="5"/>
    <rect x="695" y="330" width="4" height="5"/><rect x="705" y="330" width="4" height="5"/>
    <rect x="715" y="330" width="4" height="5"/><rect x="725" y="330" width="4" height="5"/>
    <rect x="695" y="343" width="4" height="5"/><rect x="715" y="343" width="4" height="5"/>
  </g>
  <g fill="#60c0ff" opacity="0.6">
    <rect x="470" y="255" width="4" height="5"/><rect x="490" y="255" width="4" height="5"/>
    <rect x="553" y="170" width="4" height="5"/><rect x="573" y="170" width="4" height="5"/>
    <rect x="630" y="276" width="4" height="5"/><rect x="650" y="276" width="4" height="5"/>
  </g>

  <!-- River / reflection -->
  <rect x="0" y="620" width="1200" height="180" fill="url(#water)"/>
  <!-- Reflection ripples -->
  <ellipse cx="600" cy="660" rx="480" ry="18" fill="rgba(224,92,26,0.25)"/>
  <ellipse cx="600" cy="690" rx="380" ry="12" fill="rgba(224,92,26,0.18)"/>
  <ellipse cx="600" cy="720" rx="280" ry="8"  fill="rgba(224,92,26,0.12)"/>

  <!-- Ground / bank -->
  <rect x="0" y="615" width="1200" height="12" fill="#0d0820"/>

  <!-- Label -->
  <rect x="0" y="745" width="1200" height="55" fill="rgba(0,0,0,0.4)"/>
  <text x="24" y="780" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#ffd090">City Skyline</text>
  <text x="24" y="798" font-family="system-ui,sans-serif" font-size="14" fill="#c090a0">Urban &bull; Served via CloudFront + S3</text>
</svg>
