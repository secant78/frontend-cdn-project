<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a6b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a5276;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2471a3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f7c59f;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2a4a;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1a5276;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" />
  <!-- Sunset sky -->
  <ellipse cx="700" cy="80" rx="120" ry="80" fill="#e07b39" opacity="0.3"/>
  <circle cx="700" cy="100" r="55" fill="#f0a500" opacity="0.45"/>
  <!-- White buildings (Santorini style) -->
  <rect x="200" y="270" width="60" height="80" rx="4" fill="white" opacity="0.85"/>
  <ellipse cx="230" cy="270" rx="30" ry="12" fill="#5b9bd5" opacity="0.9"/>
  <rect x="270" y="285" width="50" height="65" rx="4" fill="white" opacity="0.8"/>
  <ellipse cx="295" cy="285" rx="25" ry="10" fill="#3a7fc1" opacity="0.9"/>
  <rect x="155" y="285" width="45" height="65" rx="4" fill="white" opacity="0.75"/>
  <!-- Waves -->
  <path d="M0 390 Q100 360 200 385 Q300 410 400 380 Q500 350 600 380 Q700 410 800 375 L800 500 L0 500 Z" fill="url(#wave)" />
  <path d="M0 430 Q150 408 300 428 Q450 448 600 425 Q700 410 800 428 L800 500 L0 500 Z" fill="#0d2a4a" opacity="0.7" />
  <!-- Text -->
  <text x="400" y="195" font-family="Georgia, serif" font-size="62" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95" letter-spacing="2">Mediterranean</text>
  <text x="400" y="250" font-family="Georgia, serif" font-size="26" fill="white" text-anchor="middle" opacity="0.8">History, Culture &amp; Cuisine</text>
</svg>
