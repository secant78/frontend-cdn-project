name: "04 · Teardown Infrastructure (Destroy)"

on:
  workflow_dispatch:
    inputs:
      env_name:
        description: "Environment to destroy (production or staging)"
        required: true
        default: "production"
      confirm:
        description: "Type 'destroy' to confirm — this permanently deletes ALL infrastructure"
        required: true
        default: ""

permissions:
  id-token: write   # OIDC token for AWS authentication
  contents: read

env:
  AWS_REGION: us-east-1
  TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
  TF_WORKSPACE: frontend-cdn-project

jobs:

  # ── Safety gate ─────────────────────────────────────────────────────────────
  confirm-destroy:
    name: "Safety Check"
    runs-on: ubuntu-latest
    steps:
      - name: Verify confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "destroy" ]; then
            echo "❌ Confirmation failed — you must type 'destroy' exactly to proceed."
            echo "   You entered: '${{ github.event.inputs.confirm }}'"
            exit 1
          fi
          echo "✅ Confirmation accepted — proceeding with teardown of '${{ github.event.inputs.env_name }}'"

  # ── Empty S3 buckets (versioned buckets must be empty before destroy) ────────
  empty-s3:
    name: "Empty S3 Buckets"
    runs-on: ubuntu-latest
    needs: confirm-destroy
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: frontend-cdn-teardown

      - name: Empty static assets bucket
        run: |
          BUCKET="frontend-cdn-static-assets-${{ github.event.inputs.env_name }}"
          echo "Emptying $BUCKET ..."
          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            # Delete all versioned objects and delete markers
            aws s3api delete-objects \
              --bucket "$BUCKET" \
              --delete "$(aws s3api list-object-versions \
                --bucket "$BUCKET" \
                --query '{Objects: Versions[].{Key:Key,VersionId:VersionId}}' \
                --output json 2>/dev/null)" 2>/dev/null || true
            # Also remove any delete markers
            aws s3api delete-objects \
              --bucket "$BUCKET" \
              --delete "$(aws s3api list-object-versions \
                --bucket "$BUCKET" \
                --query '{Objects: DeleteMarkers[].{Key:Key,VersionId:VersionId}}' \
                --output json 2>/dev/null)" 2>/dev/null || true
            # Final sync removal for any remaining non-versioned objects
            aws s3 rm "s3://$BUCKET" --recursive 2>/dev/null || true
            echo "✅ $BUCKET emptied"
          else
            echo "⚠️  $BUCKET does not exist — skipping"
          fi

      - name: Empty EB deployments bucket
        run: |
          BUCKET="elasticbeanstalk-frontend-cdn-${{ github.event.inputs.env_name }}"
          echo "Emptying $BUCKET ..."
          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            aws s3api delete-objects \
              --bucket "$BUCKET" \
              --delete "$(aws s3api list-object-versions \
                --bucket "$BUCKET" \
                --query '{Objects: Versions[].{Key:Key,VersionId:VersionId}}' \
                --output json 2>/dev/null)" 2>/dev/null || true
            aws s3api delete-objects \
              --bucket "$BUCKET" \
              --delete "$(aws s3api list-object-versions \
                --bucket "$BUCKET" \
                --query '{Objects: DeleteMarkers[].{Key:Key,VersionId:VersionId}}' \
                --output json 2>/dev/null)" 2>/dev/null || true
            aws s3 rm "s3://$BUCKET" --recursive 2>/dev/null || true
            echo "✅ $BUCKET emptied"
          else
            echo "⚠️  $BUCKET does not exist — skipping"
          fi

      - name: Empty logs bucket (if exists)
        run: |
          BUCKET="frontend-cdn-logs-${{ github.event.inputs.env_name }}"
          echo "Checking $BUCKET ..."
          if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
            aws s3 rm "s3://$BUCKET" --recursive 2>/dev/null || true
            echo "✅ $BUCKET emptied"
          else
            echo "⚠️  $BUCKET does not exist — skipping"
          fi

  # ── Terraform Destroy ────────────────────────────────────────────────────────
  terraform-destroy:
    name: "Terraform Destroy"
    runs-on: ubuntu-latest
    needs: empty-s3
    defaults:
      run:
        working-directory: infrastructure/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: frontend-cdn-terraform-destroy

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Destroy Plan (preview)
        run: |
          terraform plan \
            -destroy \
            -var="env_name=${{ github.event.inputs.env_name }}" \
            -no-color 2>&1 | tee destroy_plan.txt
          echo "### Destroy Plan Preview" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -40 destroy_plan.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -auto-approve \
            -var="env_name=${{ github.event.inputs.env_name }}" \
            -no-color 2>&1 | tee destroy_output.txt

      - name: Post teardown summary
        if: always()
        run: |
          echo "## 🗑️ Teardown Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ github.event.inputs.env_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if grep -q "Destroy complete" destroy_output.txt 2>/dev/null; then
            echo "### ✅ Destroy completed successfully" >> $GITHUB_STEP_SUMMARY
            grep "Destroy complete" destroy_output.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Destroy may not have completed — check logs above" >> $GITHUB_STEP_SUMMARY
          fi
