name: "Deploy Environment (reusable)"

# ══════════════════════════════════════════════════════════════════════════════
#  Reusable workflow — called by 02-deploy-application.yml for each environment.
#  Never triggered directly.
#
#  Callers pass:
#    inputs.env_name       — dev | staging | production
#    inputs.version_label  — e.g. v42-a1b2c3d4  (built once, promoted through envs)
#    secrets.AWS_OIDC_ROLE_ARN          — OIDC role for AWS auth
#    secrets.CLOUDFRONT_DISTRIBUTION_ID — CF distribution for this env (optional)
# ══════════════════════════════════════════════════════════════════════════════

on:
  workflow_call:
    inputs:
      env_name:
        description: "Target environment (dev | staging | production)"
        required: true
        type: string
      version_label:
        description: "Version label to deploy (e.g. v42-a1b2c3d4)"
        required: true
        type: string
      aws_region:
        description: "AWS region"
        required: false
        type: string
        default: "us-east-1"
    secrets:
      AWS_OIDC_ROLE_ARN:
        required: true
      CLOUDFRONT_DISTRIBUTION_ID:
        required: false   # optional — invalidation skipped if not set

jobs:
  # ── Sync static assets to S3 + invalidate CloudFront ──────────────────────
  deploy-assets:
    name: "[${{ inputs.env_name }}] Sync Assets → S3 + CF"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}
          role-session-name: frontend-cdn-assets-${{ inputs.env_name }}

      - name: Sync assets to S3
        run: |
          BUCKET="frontend-cdn-static-assets-${{ inputs.env_name }}"
          echo "Syncing app/public/ → s3://${BUCKET}/"

          # All files except index.html get a 1-year immutable cache
          aws s3 sync \
            app/public/ \
            "s3://${BUCKET}/" \
            --cache-control "public, max-age=31536000, immutable" \
            --delete \
            --exclude "index.html"

          # index.html gets a 5-min TTL so updates are visible quickly
          aws s3 cp \
            app/public/index.html \
            "s3://${BUCKET}/index.html" \
            --cache-control "public, max-age=300"

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID="${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
          if [ -n "$DIST_ID" ]; then
            echo "Invalidating CloudFront distribution: $DIST_ID"
            aws cloudfront create-invalidation \
              --distribution-id "$DIST_ID" \
              --paths "/public/*" "/assets/*" "/images/*" "/"
          else
            echo "CLOUDFRONT_DISTRIBUTION_ID not set — skipping invalidation"
          fi

  # ── Deploy app bundle to Elastic Beanstalk ─────────────────────────────────
  deploy-beanstalk:
    name: "[${{ inputs.env_name }}] Deploy → Elastic Beanstalk"
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}
          role-session-name: frontend-cdn-eb-${{ inputs.env_name }}

      - name: Download app bundle
        uses: actions/download-artifact@v4
        with:
          name: app-bundle-${{ inputs.version_label }}
          path: ./

      - name: Deploy to Elastic Beanstalk
        run: |
          ENV_NAME="${{ inputs.env_name }}"
          VERSION_LABEL="${{ inputs.version_label }}"
          EB_APP_NAME="frontend-cdn-app-${ENV_NAME}"
          EB_ENV_NAME="frontend-cdn-env-${ENV_NAME}"
          S3_BUCKET="elasticbeanstalk-frontend-cdn-${ENV_NAME}"
          S3_KEY="eb-versions/${EB_APP_NAME}/${VERSION_LABEL}.zip"
          AWS_REGION="${{ inputs.aws_region }}"

          echo "▶ Uploading bundle to s3://${S3_BUCKET}/${S3_KEY}"
          aws s3 cp app-bundle.zip "s3://${S3_BUCKET}/${S3_KEY}"

          echo "▶ Creating application version: ${VERSION_LABEL}"
          aws elasticbeanstalk create-application-version \
            --application-name "${EB_APP_NAME}" \
            --version-label "${VERSION_LABEL}" \
            --source-bundle "S3Bucket=${S3_BUCKET},S3Key=${S3_KEY}" \
            --region "${AWS_REGION}"

          echo "▶ Deploying to environment: ${EB_ENV_NAME}"
          aws elasticbeanstalk update-environment \
            --application-name "${EB_APP_NAME}" \
            --environment-name "${EB_ENV_NAME}" \
            --version-label "${VERSION_LABEL}" \
            --region "${AWS_REGION}"

          # ── Diagnostics helper (runs on Red health or timeout) ────────────
          diagnose() {
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  EB DIAGNOSTICS — ${EB_ENV_NAME}"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            echo "── Active Version ────────────────────────────────────────"
            aws elasticbeanstalk describe-environments \
              --environment-names "${EB_ENV_NAME}" --region "${AWS_REGION}" \
              --query "Environments[0].{Version:VersionLabel,Health:Health,Status:Status}" \
              --output table 2>&1 || true

            echo "── Recent Events ─────────────────────────────────────────"
            aws elasticbeanstalk describe-events \
              --environment-name "${EB_ENV_NAME}" --region "${AWS_REGION}" \
              --max-items 30 --output text 2>&1 || true

            echo "── Instance Health ───────────────────────────────────────"
            aws elasticbeanstalk describe-instances-health \
              --environment-name "${EB_ENV_NAME}" --region "${AWS_REGION}" \
              --attribute-names All \
              --query "InstanceHealthList[*].{ID:InstanceId,Health:HealthStatus,Causes:Causes}" \
              --output json 2>&1 || true

            echo "── Direct Health Check ───────────────────────────────────"
            EB_CNAME=$(aws elasticbeanstalk describe-environments \
              --environment-names "${EB_ENV_NAME}" --region "${AWS_REGION}" \
              --query "Environments[0].CNAME" --output text)
            curl -s -m 10 -w "\n  HTTP %{http_code} in %{time_total}s\n" \
              "http://${EB_CNAME}/health" || echo "  curl: unreachable"

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          }

          echo "▶ Waiting for deployment to complete (max 15 min)..."
          for i in $(seq 1 45); do
            STATUS=$(aws elasticbeanstalk describe-environments \
              --application-name "${EB_APP_NAME}" \
              --environment-names "${EB_ENV_NAME}" \
              --region "${AWS_REGION}" \
              --query "Environments[0].Status" --output text)
            HEALTH=$(aws elasticbeanstalk describe-environments \
              --application-name "${EB_APP_NAME}" \
              --environment-names "${EB_ENV_NAME}" \
              --region "${AWS_REGION}" \
              --query "Environments[0].Health" --output text)
            echo "  [$i/45] Status: ${STATUS} | Health: ${HEALTH}"
            if [ "${STATUS}" == "Ready" ]; then
              echo "Deployment complete! Final health: ${HEALTH}"
              if [ "${HEALTH}" == "Red" ]; then
                diagnose
                exit 1
              fi
              exit 0
            fi
            sleep 20
          done
          diagnose
          echo "Timed out after 15 minutes"
          exit 1
