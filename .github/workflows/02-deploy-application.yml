name: "02 · Deploy Application"

# ══════════════════════════════════════════════════════════════════════════════
#  Promotion pipeline:  build once → dev (auto) → staging (approval) → prod (approval)
#
#  The app bundle is built a single time and promoted through environments.
#  Approvals are enforced by GitHub Environment protection rules:
#    • dev        — no approval required (auto-deploy on every push)
#    • staging    — requires 1 reviewer approval in GitHub repo settings
#    • production — requires 1 reviewer approval in GitHub repo settings
#
#  Set up once in GitHub:
#    Repo Settings → Environments → staging  → Required reviewers: [your name]
#    Repo Settings → Environments → production → Required reviewers: [your name]
#  Then add the per-env secret CLOUDFRONT_DISTRIBUTION_ID to each environment.
# ══════════════════════════════════════════════════════════════════════════════

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/02-deploy-application.yml"
      - ".github/workflows/_deploy-env.yml"

  workflow_dispatch:
    inputs:
      target_env:
        description: "Deploy up to which environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - production

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "20"

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  #  Job 1 — Build & verify the app bundle (runs once for all environments)
  # ════════════════════════════════════════════════════════════════════════════
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    outputs:
      version_label: ${{ steps.version.outputs.label }}

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate version label
        id: version
        # Short SHA + run number → unique, readable, traceable
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          LABEL="v${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          echo "label=${LABEL}" >> $GITHUB_OUTPUT
          echo "Version label: ${LABEL}"

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Verify server starts & health check passes
        run: |
          timeout 10 node server.js &
          sleep 3
          curl --fail http://localhost:8080/health || exit 1
          kill %1 || true

      - name: Archive app bundle
        run: |
          # node_modules already production-only from npm ci --omit=dev above.
          # Exclude .ebextensions — all its settings are managed by Terragrunt/Terraform.
          zip -r ../app-bundle.zip . \
            --exclude=".git/*" \
            --exclude=".ebextensions/*"
          echo "Bundle size: $(du -sh ../app-bundle.zip | cut -f1)"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          # Artifact name includes version label so each run's bundle is distinct.
          # Retention 30 days so you can re-promote an old version if needed.
          name: app-bundle-${{ steps.version.outputs.label }}
          path: app-bundle.zip
          retention-days: 30

  # ════════════════════════════════════════════════════════════════════════════
  #  Job 2 — Deploy to Dev  (automatic — no approval required)
  # ════════════════════════════════════════════════════════════════════════════
  deploy-dev:
    name: "Deploy → Dev"
    needs: build
    uses: ./.github/workflows/_deploy-env.yml
    environment: dev          # No protection rules → runs immediately after build
    with:
      env_name: dev
      version_label: ${{ needs.build.outputs.version_label }}
      aws_region: us-east-1
    secrets:
      AWS_OIDC_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

  # ════════════════════════════════════════════════════════════════════════════
  #  Job 3 — Deploy to Staging  (requires approval)
  #
  #  GitHub pauses here and sends a review request to the required reviewers
  #  configured on the "staging" environment. The SAME artifact from build
  #  (version_label) is deployed — not rebuilt.
  # ════════════════════════════════════════════════════════════════════════════
  deploy-staging:
    name: "Deploy → Staging"
    needs: [build, deploy-dev]
    # Skip if workflow_dispatch targeted dev only
    if: |
      always() &&
      needs.deploy-dev.result == 'success' &&
      (
        github.event_name == 'push' ||
        inputs.target_env == 'staging' ||
        inputs.target_env == 'production'
      )
    uses: ./.github/workflows/_deploy-env.yml
    environment: staging      # ← approval gate: configure reviewers in repo Settings → Environments
    with:
      env_name: staging
      version_label: ${{ needs.build.outputs.version_label }}
      aws_region: us-east-1
    secrets:
      AWS_OIDC_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

  # ════════════════════════════════════════════════════════════════════════════
  #  Job 4 — Deploy to Production  (requires approval)
  #
  #  Only runs after staging succeeds AND a reviewer approves.
  #  The exact same artifact (version_label) deployed to dev & staging
  #  is now promoted to production — nothing is rebuilt.
  # ════════════════════════════════════════════════════════════════════════════
  deploy-prod:
    name: "Deploy → Production"
    needs: [build, deploy-staging]
    # Skip if workflow_dispatch targeted dev or staging only
    if: |
      always() &&
      needs.deploy-staging.result == 'success' &&
      (
        github.event_name == 'push' ||
        inputs.target_env == 'production'
      )
    uses: ./.github/workflows/_deploy-env.yml
    environment: production   # ← approval gate: configure reviewers in repo Settings → Environments
    with:
      env_name: production
      version_label: ${{ needs.build.outputs.version_label }}
      aws_region: us-east-1
    secrets:
      AWS_OIDC_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
