name: "02 · Deploy Application"

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/02-deploy-application.yml"
  workflow_dispatch:
    inputs:
      env_name:
        description: "Environment name"
        required: false
        default: "production"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ENV_NAME: ${{ github.event.inputs.env_name || 'production' }}
  NODE_VERSION: "20"

jobs:
  # ── Job 1: Build & lint the Node.js app ─────────────────────────────────
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Verify server starts
        run: |
          timeout 10 node server.js &
          sleep 3
          curl --fail http://localhost:8080/health || exit 1
          kill %1 || true

      - name: Archive app bundle
        run: |
          # Zip everything except node_modules; CI will npm install on EB
          zip -r ../app-bundle.zip . --exclude="node_modules/*" --exclude=".git/*"
          echo "Bundle size: $(du -sh ../app-bundle.zip | cut -f1)"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: app-bundle.zip
          retention-days: 5

  # ── Job 2: Sync static assets to S3 + invalidate CloudFront ────────────
  deploy-assets:
    name: Sync Static Assets → S3 + CF Invalidation
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: frontend-cdn-assets-deploy

      - name: Sync CSS/JS assets to S3
        run: |
          aws s3 sync \
            app/public/ \
            s3://frontend-cdn-static-assets-${{ env.ENV_NAME }}/ \
            --cache-control "public, max-age=31536000, immutable" \
            --delete \
            --exclude "index.html"

          # index.html gets a short TTL so it can be updated without cache busting
          aws s3 cp \
            app/public/index.html \
            s3://frontend-cdn-static-assets-${{ env.ENV_NAME }}/index.html \
            --cache-control "public, max-age=300"

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID="${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
          if [ -n "$DIST_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DIST_ID" \
              --paths "/public/*" "/assets/*" "/"
            echo "CloudFront invalidation created for distribution: $DIST_ID"
          else
            echo "CLOUDFRONT_DISTRIBUTION_ID not set — skipping invalidation"
          fi

  # ── Job 3: Deploy app bundle to Elastic Beanstalk ───────────────────────
  deploy-beanstalk:
    name: Deploy → Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: frontend-cdn-eb-deploy

      - name: Download app bundle
        uses: actions/download-artifact@v4
        with:
          name: app-bundle
          path: ./

      - name: Deploy to Elastic Beanstalk
        env:
          VERSION_LABEL: "v${{ github.run_number }}-${{ github.sha }}"
          EB_APP_NAME: "frontend-cdn-app-production"
          EB_ENV_NAME: "frontend-cdn-env-production"
          S3_BUCKET: "elasticbeanstalk-frontend-cdn-production"
        run: |
          S3_KEY="eb-versions/${EB_APP_NAME}/${VERSION_LABEL}.zip"

          echo "Uploading bundle to s3://${S3_BUCKET}/${S3_KEY}"
          aws s3 cp app-bundle.zip "s3://${S3_BUCKET}/${S3_KEY}"

          echo "Creating application version: ${VERSION_LABEL}"
          aws elasticbeanstalk create-application-version \
            --application-name "${EB_APP_NAME}" \
            --version-label "${VERSION_LABEL}" \
            --source-bundle "S3Bucket=${S3_BUCKET},S3Key=${S3_KEY}" \
            --region ${{ env.AWS_REGION }}

          echo "Deploying to environment: ${EB_ENV_NAME}"
          aws elasticbeanstalk update-environment \
            --application-name "${EB_APP_NAME}" \
            --environment-name "${EB_ENV_NAME}" \
            --version-label "${VERSION_LABEL}" \
            --region ${{ env.AWS_REGION }}

          # ── Helper: dump diagnostics when health is Red ──────────────────
          diagnose() {
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  EB DIAGNOSTICS"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            echo ""
            echo "── Recent EB Events ─────────────────────────────────────"
            aws elasticbeanstalk describe-events \
              --environment-name "${EB_ENV_NAME}" \
              --region ${{ env.AWS_REGION }} \
              --max-items 20 \
              --query "Events[*].[EventDate,Severity,Message]" \
              --output text || true

            echo ""
            echo "── Instance Health Details ──────────────────────────────"
            aws elasticbeanstalk describe-instances-health \
              --environment-name "${EB_ENV_NAME}" \
              --region ${{ env.AWS_REGION }} \
              --attribute-names All \
              --query "InstanceHealthList[*].{ID:InstanceId,Health:HealthStatus,Color:Color,Causes:Causes}" \
              --output json || true

            echo ""
            echo "── Direct HTTP Check (EB CNAME) ─────────────────────────"
            EB_CNAME=$(aws elasticbeanstalk describe-environments \
              --environment-names "${EB_ENV_NAME}" \
              --region ${{ env.AWS_REGION }} \
              --query "Environments[0].CNAME" \
              --output text)
            echo "  Endpoint: http://${EB_CNAME}/health"
            curl -s -m 10 -w "\n  HTTP Status: %{http_code}\n  Total time: %{time_total}s\n" \
              "http://${EB_CNAME}/health" || echo "  curl: unreachable"

            echo ""
            echo "── Requesting Tail Logs from Instances ──────────────────"
            aws elasticbeanstalk request-environment-info \
              --environment-name "${EB_ENV_NAME}" \
              --info-type tail \
              --region ${{ env.AWS_REGION }} || true
            sleep 15
            aws elasticbeanstalk retrieve-environment-info \
              --environment-name "${EB_ENV_NAME}" \
              --info-type tail \
              --region ${{ env.AWS_REGION }} \
              --query "EnvironmentInfo[*].{Source:SourceType,Info:Message}" \
              --output text || true

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          }

          echo "Waiting for deployment to complete (max 15 min)..."
          for i in $(seq 1 45); do
            STATUS=$(aws elasticbeanstalk describe-environments \
              --application-name "${EB_APP_NAME}" \
              --environment-names "${EB_ENV_NAME}" \
              --region ${{ env.AWS_REGION }} \
              --query "Environments[0].Status" \
              --output text)
            HEALTH=$(aws elasticbeanstalk describe-environments \
              --application-name "${EB_APP_NAME}" \
              --environment-names "${EB_ENV_NAME}" \
              --region ${{ env.AWS_REGION }} \
              --query "Environments[0].Health" \
              --output text)
            echo "  [$i/45] Status: ${STATUS} | Health: ${HEALTH}"
            if [ "${STATUS}" == "Ready" ]; then
              echo "Deployment complete! Final health: ${HEALTH}"
              if [ "${HEALTH}" == "Red" ]; then
                diagnose
                echo "Environment health is Red — see diagnostics above"
                exit 1
              fi
              exit 0
            fi
            sleep 20
          done
          diagnose
          echo "Timed out after 15 minutes waiting for environment to become Ready"
          exit 1
