# After applying this, the AWS Load Balancer Controller provisions an internet-facing ALB.
# Once the ALB is ready, get its DNS name with:
#   kubectl get ingress cruise-api-ingress -n cruise-services
# Then set eks_alb_dns in infrastructure/live/dev/terragrunt.hcl and re-run terragrunt apply
# to wire CloudFront to the EKS ALB.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cruise-api-ingress
  namespace: cruise-services
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/group.name: cruise-api
spec:
  rules:
    - http:
        paths:
          - path: /api/bookings
            pathType: Prefix
            backend:
              service:
                name: booking-service
                port:
                  number: 80
          - path: /api/payments
            pathType: Prefix
            backend:
              service:
                name: payment-service
                port:
                  number: 80
